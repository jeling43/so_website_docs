version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: gcso-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - wordpress_data:/var/www/html
      - ./gcso-custom:/var/www/html/wp-content/themes/gcso-custom
    depends_on:
      - db
    networks:
      - gcso-network

  db:
    image: mysql:8.0
    container_name: gcso-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - gcso-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gcso-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - gcso-network

volumes:
  wordpress_data:
  db_data:

networks:
  gcso-network:
    driver: bridge
